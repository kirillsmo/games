<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="-apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="640" height="460" rx="14" fill="#1a1b28"/>
  <text x="22" y="30" fill="#16c47f" font-size="17" font-weight="700">Схема: UNO + L298N + датчики (пины — сверь со своей платой)</text>

  <!-- Arduino UNO -->
  <rect x="30" y="70" width="150" height="320" rx="10" fill="#13351f" stroke="#16c47f" stroke-width="2"/>
  <text x="105" y="96" fill="#eaeaea" font-size="15" text-anchor="middle" font-weight="700">Arduino UNO</text>
  <g font-size="12" text-anchor="end">
    <text x="160" y="130" fill="#6cb2ff">D5 (ENA)</text>
    <text x="160" y="154" fill="#6cb2ff">D6 (ENB)</text>
    <text x="160" y="178" fill="#cfcfe0">D7 D8 D9 D11</text>
    <text x="160" y="206" fill="#ffd166">D3 (серво)</text>
    <text x="160" y="230" fill="#16c47f">D12 (TRIG)</text>
    <text x="160" y="254" fill="#16c47f">D13 (ECHO)</text>
    <text x="160" y="282" fill="#ff9e64">A0 A1 A2</text>
    <text x="160" y="320" fill="#a78bfa">RX0 / TX1</text>
  </g>

  <!-- L298N -->
  <rect x="250" y="80" width="150" height="120" rx="10" fill="#2f3550" stroke="#6cb2ff" stroke-width="2"/>
  <text x="325" y="106" fill="#eaeaea" font-size="14" text-anchor="middle" font-weight="700">L298N</text>
  <text x="325" y="128" fill="#9a9ab0" font-size="11" text-anchor="middle">драйвер моторов</text>
  <text x="325" y="150" fill="#9a9ab0" font-size="11" text-anchor="middle">ENA·IN1·IN2 (лев)</text>
  <text x="325" y="168" fill="#9a9ab0" font-size="11" text-anchor="middle">ENB·IN3·IN4 (прав)</text>
  <path d="M180 135 C 215 135, 220 120, 250 120" fill="none" stroke="#6cb2ff" stroke-width="2.5"/>
  <path d="M180 175 C 215 175, 220 150, 250 150" fill="none" stroke="#cfcfe0" stroke-width="2.5"/>

  <!-- моторы -->
  <rect x="450" y="78" width="160" height="50" rx="8" fill="#222433" stroke="#6cb2ff" stroke-width="1.2"/>
  <text x="530" y="100" fill="#eaeaea" font-size="12" text-anchor="middle">⚙️ левые моторы ×2</text>
  <text x="530" y="118" fill="#9a9ab0" font-size="11" text-anchor="middle">от ENA/IN1/IN2</text>
  <rect x="450" y="138" width="160" height="50" rx="8" fill="#222433" stroke="#6cb2ff" stroke-width="1.2"/>
  <text x="530" y="160" fill="#eaeaea" font-size="12" text-anchor="middle">⚙️ правые моторы ×2</text>
  <text x="530" y="178" fill="#9a9ab0" font-size="11" text-anchor="middle">от ENB/IN3/IN4</text>
  <line x1="400" y1="120" x2="450" y2="103" stroke="#6cb2ff" stroke-width="2"/>
  <line x1="400" y1="160" x2="450" y2="163" stroke="#cfcfe0" stroke-width="2"/>

  <!-- серво + ультразвук -->
  <rect x="250" y="220" width="200" height="70" rx="8" fill="#222433" stroke="#ffd166" stroke-width="1.4"/>
  <text x="350" y="246" fill="#eaeaea" font-size="13" text-anchor="middle" font-weight="700">🔭 серво + ультразвук</text>
  <text x="350" y="268" fill="#9a9ab0" font-size="11" text-anchor="middle">серво D3 · TRIG D12 · ECHO D13</text>
  <path d="M180 206 C 215 206, 220 240, 250 240" fill="none" stroke="#ffd166" stroke-width="2.5"/>
  <path d="M180 242 C 215 250, 220 258, 250 258" fill="none" stroke="#16c47f" stroke-width="2.5"/>

  <!-- датчики линии -->
  <rect x="250" y="305" width="200" height="55" rx="8" fill="#222433" stroke="#ff9e64" stroke-width="1.4"/>
  <text x="350" y="330" fill="#eaeaea" font-size="13" text-anchor="middle" font-weight="700">▣ датчики линии (3 шт)</text>
  <text x="350" y="350" fill="#9a9ab0" font-size="11" text-anchor="middle">слева A0 · центр A1 · справа A2</text>
  <path d="M180 282 C 215 282, 220 330, 250 330" fill="none" stroke="#ff9e64" stroke-width="2.5"/>

  <!-- Bluetooth -->
  <rect x="250" y="378" width="200" height="50" rx="8" fill="#222433" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="350" y="400" fill="#eaeaea" font-size="13" text-anchor="middle" font-weight="700">📶 Bluetooth-модуль</text>
  <text x="350" y="418" fill="#9a9ab0" font-size="11" text-anchor="middle">его TX→RX(0), RX→TX(1) — это и есть Serial</text>
  <path d="M180 320 C 215 320, 220 400, 250 400" fill="none" stroke="#a78bfa" stroke-width="2.5"/>

  <text x="465" y="240" fill="#ffd166" font-size="11" font-weight="700">⚡ Питание —</text>
  <text x="465" y="258" fill="#9a9ab0" font-size="11">от батарей 18650</text>
  <text x="465" y="274" fill="#9a9ab0" font-size="11">через L298N.</text>
  <text x="465" y="300" fill="#ff6b6b" font-size="11">⚠ При первом</text>
  <text x="465" y="316" fill="#ff6b6b" font-size="11">тесте подними</text>
  <text x="465" y="332" fill="#ff6b6b" font-size="11">машину на коробок!</text>
</svg>
