<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 400" font-family="-apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="580" height="400" rx="14" fill="#1a1b28"/>
  <text x="22" y="30" fill="#16c47f" font-size="17" font-weight="700">Схема подключения</text>

  <!-- Arduino -->
  <rect x="28" y="60" width="150" height="180" rx="10" fill="#13351f" stroke="#16c47f" stroke-width="2"/>
  <text x="103" y="88" fill="#eaeaea" font-size="16" text-anchor="middle" font-weight="700">Arduino</text>
  <text x="103" y="108" fill="#9a9ab0" font-size="12" text-anchor="middle">(USB к компьютеру)</text>
  <!-- пины -->
  <text x="44" y="138" fill="#ffb74d" font-size="13">пин 3</text>
  <text x="44" y="162" fill="#ffb74d" font-size="13">пин 5</text>
  <text x="44" y="186" fill="#ffb74d" font-size="13">пин 6</text>
  <text x="44" y="210" fill="#ffb74d" font-size="13">пин 9</text>
  <text x="120" y="232" fill="#cfcfe0" font-size="13">GND</text>
  <circle cx="172" cy="134" r="4" fill="#ffb74d"/>
  <circle cx="172" cy="158" r="4" fill="#ffb74d"/>
  <circle cx="172" cy="182" r="4" fill="#ffb74d"/>
  <circle cx="172" cy="206" r="4" fill="#ffb74d"/>
  <circle cx="172" cy="228" r="4" fill="#cfcfe0"/>

  <!-- 4 серво -->
  <g>
    <rect x="392" y="64" width="160" height="34" rx="6" fill="#2f3550" stroke="#6c8cff" stroke-width="1.5"/>
    <text x="472" y="86" fill="#eaeaea" font-size="14" text-anchor="middle">серво 0 — база</text>
    <rect x="392" y="106" width="160" height="34" rx="6" fill="#2f3550" stroke="#6c8cff" stroke-width="1.5"/>
    <text x="472" y="128" fill="#eaeaea" font-size="14" text-anchor="middle">серво 1 — плечо</text>
    <rect x="392" y="148" width="160" height="34" rx="6" fill="#2f3550" stroke="#6c8cff" stroke-width="1.5"/>
    <text x="472" y="170" fill="#eaeaea" font-size="14" text-anchor="middle">серво 2 — локоть</text>
    <rect x="392" y="190" width="160" height="34" rx="6" fill="#2f3550" stroke="#6c8cff" stroke-width="1.5"/>
    <text x="472" y="212" fill="#eaeaea" font-size="14" text-anchor="middle">серво 3 — захват</text>
  </g>

  <!-- сигнальные провода пины -> серво (оранжевые) -->
  <path d="M172 134 C 280 134, 300 81, 392 81"  fill="none" stroke="#ffb74d" stroke-width="2.5"/>
  <path d="M172 158 C 280 158, 300 123, 392 123" fill="none" stroke="#ffb74d" stroke-width="2.5"/>
  <path d="M172 182 C 280 182, 300 165, 392 165" fill="none" stroke="#ffb74d" stroke-width="2.5"/>
  <path d="M172 206 C 280 206, 300 207, 392 207" fill="none" stroke="#ffb74d" stroke-width="2.5"/>

  <!-- внешнее питание -->
  <rect x="210" y="300" width="170" height="70" rx="10" fill="#3a1e1e" stroke="#ff6b6b" stroke-width="2"/>
  <text x="295" y="326" fill="#eaeaea" font-size="14" text-anchor="middle" font-weight="700">Питание 5–6 В, 2–3 А</text>
  <text x="248" y="352" fill="#ff6b6b" font-size="15" font-weight="700">+</text>
  <text x="338" y="352" fill="#cfcfe0" font-size="15" font-weight="700">−</text>

  <!-- + питания -> все серво (красный) -->
  <path d="M252 350 C 252 280, 560 280, 560 98 L 552 98" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
  <text x="566" y="150" fill="#ff6b6b" font-size="11" transform="rotate(90 566 150)">+5В на все серво</text>

  <!-- общая земля: серво GND и Arduino GND -> минус (белый/серый) -->
  <path d="M342 350 C 342 260, 388 260, 388 240 L 388 232" fill="none" stroke="#cfcfe0" stroke-width="2.5"/>
  <path d="M342 352 C 200 352, 120 300, 120 240" fill="none" stroke="#cfcfe0" stroke-width="2.5"/>
  <text x="150" y="300" fill="#ffd166" font-size="13" font-weight="700">⚠ ОБЩАЯ ЗЕМЛЯ</text>

  <text x="22" y="392" fill="#9a9ab0" font-size="12">Сигнал — с пинов Arduino. Питание серво — ОТДЕЛЬНОЕ, не от Arduino. Минусы соединены вместе.</text>
</svg>
