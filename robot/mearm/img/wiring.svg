<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" font-family="-apple-system, Segoe UI, sans-serif">
  <rect x="0" y="0" width="620" height="420" rx="14" fill="#1a1b28"/>
  <text x="22" y="30" fill="#16c47f" font-size="17" font-weight="700">Схема: Nano + 4 серво напрямую (питание по USB)</text>

  <!-- USB источник -->
  <rect x="20" y="52" width="150" height="40" rx="8" fill="#262738" stroke="#9a9ab0" stroke-width="1.5"/>
  <text x="95" y="70" fill="#eaeaea" font-size="12" text-anchor="middle">💻 USB 5 В</text>
  <text x="95" y="85" fill="#9a9ab0" font-size="11" text-anchor="middle">(ПК или зарядка 2 А)</text>

  <!-- Nano -->
  <rect x="40" y="120" width="150" height="220" rx="10" fill="#13351f" stroke="#16c47f" stroke-width="2"/>
  <text x="115" y="146" fill="#eaeaea" font-size="15" text-anchor="middle" font-weight="700">Arduino Nano</text>
  <text x="120" y="156" fill="#9a9ab0" font-size="10" text-anchor="middle">(Firmata)</text>
  <rect x="28" y="140" width="16" height="22" rx="2" fill="#9a9ab0"/>
  <line x1="36" y1="92" x2="36" y2="140" stroke="#9a9ab0" stroke-width="3"/>
  <!-- сигнальные пины Nano (справа) -->
  <text x="150" y="178" fill="#ffd166" font-size="12" text-anchor="end">D9  база</text>
  <text x="150" y="208" fill="#ffd166" font-size="12" text-anchor="end">D10 плечо</text>
  <text x="150" y="238" fill="#ffd166" font-size="12" text-anchor="end">D11 локоть</text>
  <text x="150" y="268" fill="#ffd166" font-size="12" text-anchor="end">D6  захват</text>
  <text x="150" y="300" fill="#ff6b6b" font-size="12" text-anchor="end">5V</text>
  <text x="150" y="322" fill="#cfcfe0" font-size="12" text-anchor="end">GND</text>
  <circle cx="190" cy="174" r="4" fill="#ffd166"/>
  <circle cx="190" cy="204" r="4" fill="#ffd166"/>
  <circle cx="190" cy="234" r="4" fill="#ffd166"/>
  <circle cx="190" cy="264" r="4" fill="#ffd166"/>
  <circle cx="190" cy="296" r="4" fill="#ff6b6b"/>
  <circle cx="190" cy="318" r="4" fill="#cfcfe0"/>

  <!-- серво -->
  <g font-size="12">
    <rect x="430" y="158" width="160" height="32" rx="5" fill="#222433" stroke="#6c8cff" stroke-width="1.2"/>
    <text x="510" y="179" fill="#eaeaea" text-anchor="middle">серво «база»</text>
    <rect x="430" y="196" width="160" height="32" rx="5" fill="#222433" stroke="#6c8cff" stroke-width="1.2"/>
    <text x="510" y="217" fill="#eaeaea" text-anchor="middle">серво «плечо»</text>
    <rect x="430" y="234" width="160" height="32" rx="5" fill="#222433" stroke="#6c8cff" stroke-width="1.2"/>
    <text x="510" y="255" fill="#eaeaea" text-anchor="middle">серво «локоть»</text>
    <rect x="430" y="272" width="160" height="32" rx="5" fill="#222433" stroke="#6c8cff" stroke-width="1.2"/>
    <text x="510" y="293" fill="#eaeaea" text-anchor="middle">серво «захват»</text>
  </g>

  <!-- сигнальные провода Nano -> серво -->
  <path d="M190 174 C 320 174, 320 174, 430 174" fill="none" stroke="#ffd166" stroke-width="2.5"/>
  <path d="M190 204 C 320 204, 320 212, 430 212" fill="none" stroke="#ffd166" stroke-width="2.5"/>
  <path d="M190 234 C 320 234, 320 250, 430 250" fill="none" stroke="#ffd166" stroke-width="2.5"/>
  <path d="M190 264 C 320 264, 320 288, 430 288" fill="none" stroke="#ffd166" stroke-width="2.5"/>
  <!-- питание ко всем серво -->
  <path d="M190 296 C 300 296, 300 330, 410 330 L 410 174" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <path d="M190 318 C 290 318, 290 348, 420 348 L 420 188" fill="none" stroke="#cfcfe0" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="250" y="372" fill="#ff6b6b" font-size="11">5V и GND — на питание всех серво (общая земля)</text>

  <!-- пояснения -->
  <text x="22" y="398" fill="#ffd166" font-size="12" font-weight="700">⚡ Сигнал каждого серво — на свою ножку Nano (D9/D10/D11/D6). Питание — 5V и GND.</text>
  <text x="22" y="416" fill="#ff6b6b" font-size="12">⚠ USB ПК даёт ~0,5 А — двигай по одному суставу. Надёжнее: USB-зарядка/хаб 2 А.</text>
</svg>
